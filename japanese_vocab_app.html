
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-pastel:#c8e6a0;
  --green-pastel-dark:#a8cc78;
  --green-pastel-deeper:#7aaa3e;
  --green-pastel-text:#3d6b10;
  --green-pastel-bg:#f0f9e0;
  --green-pastel-light:#e8f5d0;
}
body{background:#f2f4f0}
.app{max-width:480px;margin:0 auto;font-family:var(--font-sans)}

.app-header{background:var(--green-pastel);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:17px;font-weight:500;color:var(--green-pastel-text)}
.header-info{font-size:12px;color:var(--green-pastel-deeper)}
.reset-btn{font-size:12px;color:var(--green-pastel-deeper);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline}
.reset-btn:hover{color:var(--green-pastel-text)}

.tab-bar{display:flex;background:#fff;border-bottom:0.5px solid #e0e0da}
.tab{flex:1;padding:11px;text-align:center;font-size:14px;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.tab.active{color:var(--green-pastel-text);border-bottom:2px solid var(--green-pastel-dark);font-weight:500}

.page{padding:16px;background:#f2f4f0;min-height:500px}

.sub-tab-bar{display:flex;gap:6px;margin-bottom:1.25rem}
.sub-tab{padding:6px 16px;font-size:13px;border:0.5px solid #d0d0c8;border-radius:20px;cursor:pointer;color:#888;background:#fff}
.sub-tab.active{background:var(--green-pastel);color:var(--green-pastel-text);border-color:var(--green-pastel-dark);font-weight:500}

.section-title{font-size:11px;color:#999;margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}

.card-section{background:#fff;border-radius:12px;border:0.5px solid #e4e4de;margin-bottom:12px;overflow:hidden}

.upload-area{background:#fff;border:1.5px dashed var(--green-pastel-dark);border-radius:12px;padding:1.5rem;text-align:center;color:#999;font-size:14px;cursor:pointer;margin-bottom:12px}
.upload-area:hover{background:var(--green-pastel-bg)}
.upload-plus{font-size:22px;color:var(--green-pastel-deeper);margin-bottom:6px}

.day-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:0.5px solid #f0f0ea;cursor:pointer}
.day-item:last-child{border-bottom:none}
.day-item:hover{background:var(--green-pastel-bg)}
.day-item-name{font-size:14px;font-weight:500;color:#333}
.day-item-sub{font-size:12px;color:#aaa;margin-top:2px}
.day-item-right{display:flex;align-items:center;gap:8px}
.pill{font-size:11px;padding:3px 9px;border-radius:10px;background:#f0f0ea;color:#999}
.pill.done{background:var(--green-pastel-light);color:var(--green-pastel-text)}
.pill.ongoing{background:#ddeeff;color:#336699}
.del-btn{width:20px;height:20px;border-radius:50%;background:none;border:0.5px solid #d8d8d0;color:#aaa;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:#f0f0ea}

.review-btn{width:100%;padding:13px 14px;border:none;border-bottom:0.5px solid #f0f0ea;cursor:pointer;background:#fff;font-size:14px;color:#333;display:flex;align-items:center;gap:12px;text-align:left}
.review-btn:last-child{border-bottom:none}
.review-btn:hover{background:var(--green-pastel-bg)}
.review-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ri-recent{background:var(--green-pastel-light);color:var(--green-pastel-text)}
.ri-pick{background:#f0f0ea;color:#666}
.ri-star{background:#fff8e0;color:#b07800}
.ri-weak{background:#f0f0ea;color:#666}

.study-page{padding:16px;background:#f2f4f0;min-height:500px}
.back-btn{font-size:13px;color:#999;cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px;background:none;border:none;padding:0}
.back-btn:hover{color:#555}
.session-label{font-size:13px;font-weight:500;color:#444;margin-bottom:6px;text-align:center}
.progress-bar{height:5px;background:#e4e4de;border-radius:3px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;background:var(--green-pastel-dark);border-radius:3px;transition:width 0.3s}
.counter{font-size:13px;color:#aaa;margin-bottom:12px;text-align:center}

.word-card{background:#fff;border:0.5px solid #e4e4de;border-radius:16px;padding:2rem 1.5rem;margin-bottom:12px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative}
.star-btn{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:22px;color:#ccc;line-height:1;padding:4px}
.star-btn.starred{color:#e6a800}
.word-reading{font-size:15px;color:#aaa;min-height:22px;text-align:center}
.word-main{font-size:48px;font-weight:500;color:#222;line-height:1.2;text-align:center}
.word-meaning{font-size:17px;font-weight:500;min-height:24px;text-align:center;color:#444}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.action-btn{padding:13px;border:0.5px solid #d8d8d0;border-radius:10px;cursor:pointer;background:#fff;font-size:14px;color:#444}
.action-btn:hover{background:#f8f8f4}
.action-btn.reveal{border-color:var(--green-pastel-dark);color:var(--green-pastel-text);background:var(--green-pastel-bg)}
.action-btn.reveal:hover{background:var(--green-pastel-light)}
.action-btn.danger{border-color:#ffb3a8;color:#c0392b;background:#fff5f4}
.action-btn.danger:hover{background:#ffe8e4}
.action-btn.success{border-color:var(--green-pastel-dark);color:var(--green-pastel-text);background:var(--green-pastel-light)}
.action-btn.success:hover{background:var(--green-pastel)}

.complete-card{background:#fff;border:0.5px solid #e4e4de;border-radius:16px;padding:2rem;text-align:center}
.stats-row{display:flex;justify-content:center;gap:2.5rem;margin-bottom:1.5rem}
.stat-num{font-size:26px;font-weight:500}
.stat-label{font-size:12px;color:#aaa;margin-top:2px}
.std-btn{width:100%;padding:12px;border:0.5px solid #d8d8d0;border-radius:10px;cursor:pointer;background:#fff;font-size:14px;margin-top:8px;color:#444}
.std-btn:hover{background:#f8f8f4}
.std-btn.primary{background:var(--green-pastel);color:var(--green-pastel-text);border-color:var(--green-pastel-dark)}
.std-btn.primary:hover{background:var(--green-pastel-dark);color:#fff}

.week-row{display:flex;gap:6px;margin-bottom:12px}
.week-day{flex:1;text-align:center;padding:8px 2px;border-radius:10px;background:#fff;border:0.5px solid #e4e4de}
.wd-label{font-size:11px;color:#bbb;margin-bottom:5px}
.wd-dot{width:18px;height:18px;border-radius:50%;margin:0 auto;background:#e8e8e4}
.week-day.studied .wd-dot{background:var(--green-pastel-dark)}
.week-day.studied .wd-label{color:var(--green-pastel-text);font-weight:500}
.week-day.today{border-color:var(--green-pastel-dark);background:var(--green-pastel-bg)}

.stat-row-item{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:0.5px solid #f0f0ea}
.stat-row-item:last-child{border-bottom:none}
.report-nav-btn{width:100%;padding:13px 14px;border:none;border-bottom:0.5px solid #f0f0ea;cursor:pointer;background:#fff;font-size:14px;color:#333;display:flex;align-items:center;justify-content:space-between;text-align:left}
.report-nav-btn:last-child{border-bottom:none}
.report-nav-btn:hover{background:var(--green-pastel-bg)}
.nav-arrow{color:#ccc;font-size:18px}

.rank-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #f0f0ea}
.rank-item:last-child{border-bottom:none}
.rank-num{font-size:12px;font-weight:500;color:#bbb;width:22px;text-align:center;flex-shrink:0}
.rank-kanji{font-size:15px;font-weight:500;color:#333}
.rank-reading{font-size:11px;color:#aaa}
.rank-count{font-size:13px;color:#c0392b;font-weight:500;flex-shrink:0}
.star-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid #f0f0ea}
.star-item:last-child{border-bottom:none}
.empty-state{padding:2rem 1rem;text-align:center;color:#bbb;font-size:14px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:1.5rem;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1rem;color:#333}
.modal-close{float:right;background:none;border:none;cursor:pointer;font-size:20px;color:#bbb;line-height:1}
.checkbox-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid #f0f0ea;cursor:pointer}
.checkbox-item input{width:16px;height:16px;cursor:pointer;flex-shrink:0;accent-color:var(--green-pastel-deeper)}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#3d4a30;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>

<script>
const WEAK_LIMIT=200;
let allDays={},studyQueue=[],currentIdx=0,knownCount=0,unknownWords=[];
let currentSessionLabel='',currentDayKey='',pendingDayKey='';

function loadDB(){try{const s=localStorage.getItem('jvoc_days_v7');if(s)allDays=JSON.parse(s);}catch(e){allDays={};}}
function saveDB(){localStorage.setItem('jvoc_days_v7',JSON.stringify(allDays));}
function getUnknownLog(){try{return JSON.parse(localStorage.getItem('jvoc_unknown_v7')||'{}');}catch(e){return {};}}
function saveUnknownLog(l){localStorage.setItem('jvoc_unknown_v7',JSON.stringify(l));}
function getHistory(){try{return JSON.parse(localStorage.getItem('jvoc_history_v7')||'{}');}catch(e){return {};}}
function saveHistory(h){localStorage.setItem('jvoc_history_v7',JSON.stringify(h));}
function getStarred(){try{return JSON.parse(localStorage.getItem('jvoc_starred_v7')||'[]');}catch(e){return [];}}
function saveStarred(s){localStorage.setItem('jvoc_starred_v7',JSON.stringify(s));}
function getProgress(){try{return JSON.parse(localStorage.getItem('jvoc_progress_v7')||'{}');}catch(e){return {};}}
function saveProgress(p){localStorage.setItem('jvoc_progress_v7',JSON.stringify(p));}
function getStudyLog(){try{return JSON.parse(localStorage.getItem('jvoc_studylog_v7')||'{}');}catch(e){return {};}}
function saveStudyLog(s){localStorage.setItem('jvoc_studylog_v7',JSON.stringify(s));}

function resetAll(){
  if(!confirm('모든 데이터를 삭제할까요?'))return;
  ['jvoc_days_v7','jvoc_unknown_v7','jvoc_history_v7','jvoc_starred_v7','jvoc_progress_v7','jvoc_studylog_v7'].forEach(k=>localStorage.removeItem(k));
  allDays={};renderDayList();updateTotalInfo();showToast('초기화 완료');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function decodeCSV(buf){
  for(const enc of ['UTF-8','EUC-KR','Shift_JIS','UTF-16LE']){
    try{const t=new TextDecoder(enc,{fatal:true}).decode(buf);if(!t.includes('\uFFFD')&&t.trim())return t;}catch(e){}
  }
  return new TextDecoder('UTF-8',{fatal:false}).decode(buf);
}
function splitLine(line){
  const parts=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){parts.push(cur.trim());cur='';continue;}
    cur+=ch;
  }
  parts.push(cur.trim());return parts;
}
function parseCSV(text){
  const words=[],lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const p=splitLine(lines[i]);
    if(p.length>=4&&p[1]&&p[1].trim())
      words.push({kanji:p[1].trim(),reading:p[2]?p[2].trim():'',meaning:p[3]?p[3].trim():''});
  }
  return words;
}
function handleCSV(e){
  const files=Array.from(e.target.files);let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const words=parseCSV(decodeCSV(ev.target.result));
      if(words.length>0){
        allDays[file.name.replace(/\.csv$/i,'')]=words;loaded++;
        if(loaded===files.length){saveDB();renderDayList();updateTotalInfo();showToast(`${loaded}개 파일 저장 완료`);}
      }else showToast(`${file.name}: 단어를 읽지 못했어요`);
    };
    reader.readAsArrayBuffer(file);
  });
  e.target.value='';
}
function updateTotalInfo(){
  const days=Object.keys(allDays).length,words=Object.values(allDays).reduce((a,b)=>a+b.length,0);
  document.getElementById('total-info').textContent=days>0?`${days}일 · ${words}단어`:'';
}
function renderDayList(){
  const wrap=document.getElementById('day-list-wrap'),list=document.getElementById('day-list');
  const days=Object.keys(allDays).sort();
  if(!days.length){wrap.style.display='none';return;}
  wrap.style.display='';
  const prog=getProgress();list.innerHTML='';
  days.forEach(day=>{
    const total=allDays[day].length,p=prog[day];
    const done=p&&p.idx>=total,ongoing=p&&p.idx>0&&!done;
    const div=document.createElement('div');div.className='day-item';
    div.innerHTML=`<div><div class="day-item-name">${day}</div><div class="day-item-sub">${total}단어${ongoing?' · '+p.idx+'/'+total+' 진행중':done?' · 완료':''}</div></div>
      <div class="day-item-right">
        <span class="pill${done?' done':ongoing?' ongoing':''}">${done?'완료':ongoing?Math.round(p.idx/total*100)+'%':'미시작'}</span>
        <button class="del-btn">×</button>
      </div>`;
    div.querySelector('.del-btn').addEventListener('click',e=>{e.stopPropagation();deleteDay(day);});
    div.addEventListener('click',()=>handleDayClick(day));
    list.appendChild(div);
  });
}
function deleteDay(day){
  if(!confirm(`"${day}" 을(를) 삭제할까요?`))return;
  delete allDays[day];saveDB();renderDayList();updateTotalInfo();showToast(`"${day}" 삭제됨`);
}
function handleDayClick(day){
  const prog=getProgress(),p=prog[day],total=allDays[day].length;
  if(p&&p.idx>0&&p.idx<total){
    pendingDayKey=day;
    document.getElementById('resume-title').textContent=`"${day}" 이어하기`;
    document.getElementById('resume-sub').textContent=`${p.idx}/${total} 단어까지 진행했어요`;
    document.getElementById('resume-modal').style.display='flex';
  }else freshStudyDay(day);
}
function resumeStudy(){
  document.getElementById('resume-modal').style.display='none';
  const day=pendingDayKey,prog=getProgress(),p=prog[day],words=allDays[day];
  startStudySession(day,day,p.order.slice(p.idx).map(i=>words[i]),p.idx,p.order);
}
function freshStudy(){document.getElementById('resume-modal').style.display='none';freshStudyDay(pendingDayKey);}
function freshStudyDay(day){
  const words=allDays[day],order=shuffle([...Array(words.length).keys()]);
  startStudySession(day,day,order.map(i=>words[i]),0,order);
}
function startStudySession(dayKey,label,queue,startIdx,order){
  currentDayKey=dayKey;currentSessionLabel=label;
  studyQueue=queue;currentIdx=0;knownCount=0;unknownWords=[];
  if(dayKey){
    const prog=getProgress();
    if(!prog[dayKey])prog[dayKey]={};
    prog[dayKey].order=order;prog[dayKey].idx=startIdx;saveProgress(prog);
  }
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-complete').style.display='none';
  document.getElementById('view-study').style.display='';
  document.getElementById('session-label').textContent=label;
  renderCard();
  const hist=getHistory();
  if(!hist[dayKey||label])hist[dayKey||label]={count:0};
  hist[dayKey||label].last=Date.now();hist[dayKey||label].count++;saveHistory(hist);
  recordStudyDay();
}
function recordStudyDay(){
  const log=getStudyLog(),today=new Date().toDateString();
  if(!log[today])log[today]={sessions:0,words:0};
  log[today].sessions++;saveStudyLog(log);
}
function recordWordsStudied(n){
  const log=getStudyLog(),today=new Date().toDateString();
  if(!log[today])log[today]={sessions:0,words:0};
  log[today].words=(log[today].words||0)+n;saveStudyLog(log);
}
function startReviewRecent(){
  const hist=getHistory();
  const sorted=Object.keys(hist).filter(d=>allDays[d]).sort((a,b)=>hist[b].last-hist[a].last).slice(0,3);
  if(!sorted.length){showToast('학습한 파일이 없습니다');return;}
  startStudySession('','최근 3일 복습',shuffle(sorted.flatMap(k=>allDays[k])),0,[]);
}
function openPickModal(){
  const days=Object.keys(allDays).sort();
  if(!days.length){showToast('업로드된 파일이 없습니다');return;}
  document.getElementById('pick-list').innerHTML=days.map(d=>`
    <label class="checkbox-item">
      <input type="checkbox" value="${d}" onchange="limitPickCheck(this)">
      <div><div style="font-size:14px;color:#333">${d}</div><div style="font-size:12px;color:#aaa">${allDays[d].length}단어</div></div>
    </label>`).join('');
  document.getElementById('pick-modal').style.display='flex';
}
function limitPickCheck(el){
  if(document.querySelectorAll('#pick-list input:checked').length>5){el.checked=false;showToast('최대 5개까지 선택 가능해요');}
}
function closePickModal(e){
  if(!e||e.target===document.getElementById('pick-modal'))
    document.getElementById('pick-modal').style.display='none';
}
function startReviewPick(){
  const checked=Array.from(document.querySelectorAll('#pick-list input:checked')).map(el=>el.value);
  if(!checked.length){showToast('파일을 선택해주세요');return;}
  closePickModal();
  startStudySession('',`파일 복습 (${checked.length}개)`,shuffle(checked.flatMap(k=>allDays[k])),0,[]);
}
function startReviewStar(){
  const s=getStarred();if(!s.length){showToast('별표 표시한 단어가 없습니다');return;}
  startStudySession('','별표 단어 복습',shuffle([...s]),0,[]);
}
function startReviewWeak(){
  const w=getWeakWords();if(!w.length){showToast('모르겠음으로 표시된 단어가 없습니다');return;}
  startStudySession('','모름 Top 200 복습',shuffle(w),0,[]);
}
function getWeakWords(){
  const log=getUnknownLog(),ago=Date.now()-7*24*60*60*1000;
  return Object.entries(log).filter(([,v])=>v.lastSeen>=ago&&v.count>0)
    .map(([k,v])=>{try{return{...JSON.parse(k),unknownCount:v.count};}catch(e){return null;}})
    .filter(Boolean).sort((a,b)=>b.unknownCount-a.unknownCount).slice(0,WEAK_LIMIT);
}
function renderCard(){
  if(currentIdx>=studyQueue.length){showComplete();return;}
  const w=studyQueue[currentIdx];
  document.getElementById('word-main').textContent=w.kanji;
  document.getElementById('word-reading').textContent=w.reading;
  document.getElementById('word-meaning').textContent=w.meaning;
  document.getElementById('word-reading').style.visibility='hidden';
  document.getElementById('word-meaning').style.visibility='hidden';
  const pct=Math.round((currentIdx/studyQueue.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('counter').textContent=`${currentIdx+1} / ${studyQueue.length}`;
  updateStarBtn();
}
function updateStarBtn(){
  const w=studyQueue[currentIdx];if(!w)return;
  const isStarred=getStarred().some(s=>s.kanji===w.kanji&&s.reading===w.reading);
  document.getElementById('star-btn').textContent=isStarred?'★':'☆';
  document.getElementById('star-btn').classList.toggle('starred',isStarred);
}
function toggleStar(){
  const w=studyQueue[currentIdx];if(!w)return;
  let starred=getStarred();
  const idx=starred.findIndex(s=>s.kanji===w.kanji&&s.reading===w.reading);
  if(idx>=0){starred.splice(idx,1);showToast('별표 해제');}
  else{starred.push({kanji:w.kanji,reading:w.reading,meaning:w.meaning,starredAt:Date.now()});showToast('별표 추가 ★');}
  saveStarred(starred);updateStarBtn();
}
function revealReading(){document.getElementById('word-reading').style.visibility='visible';}
function revealMeaning(){document.getElementById('word-meaning').style.visibility='visible';}
function markUnknown(){
  const w=studyQueue[currentIdx];unknownWords.push(w);
  const log=getUnknownLog(),key=JSON.stringify({kanji:w.kanji,reading:w.reading,meaning:w.meaning});
  if(!log[key])log[key]={count:0,lastSeen:0};
  log[key].count++;log[key].lastSeen=Date.now();saveUnknownLog(log);
  advanceCard();
}
function markKnown(){knownCount++;advanceCard();}
function advanceCard(){
  currentIdx++;
  if(currentDayKey){
    const prog=getProgress();
    if(prog[currentDayKey]){prog[currentDayKey].idx=(prog[currentDayKey].idx||0)+1;saveProgress(prog);}
  }
  renderCard();
}
function showComplete(){
  recordWordsStudied(studyQueue.length);
  if(currentDayKey){
    const prog=getProgress();
    if(prog[currentDayKey]){prog[currentDayKey].idx=allDays[currentDayKey]?allDays[currentDayKey].length:999;saveProgress(prog);}
    renderDayList();
  }
  document.getElementById('view-study').style.display='none';
  document.getElementById('view-complete').style.display='';
  document.getElementById('complete-title').textContent=`${currentSessionLabel} 완료!`;
  document.getElementById('complete-sub').textContent=`총 ${studyQueue.length}개 단어 학습`;
  document.getElementById('stat-known').textContent=knownCount;
  document.getElementById('stat-unknown').textContent=unknownWords.length;
  document.getElementById('retry-btn').style.display=unknownWords.length?'':'none';
}
function retryUnknown(){
  const words=[...unknownWords];unknownWords=[];knownCount=0;
  studyQueue=shuffle(words);currentIdx=0;
  document.getElementById('view-complete').style.display='none';
  document.getElementById('view-study').style.display='';
  renderCard();
}
function goHome(){
  document.getElementById('view-study').style.display='none';
  document.getElementById('view-complete').style.display='none';
  document.getElementById('view-home').style.display='';
  renderDayList();
}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='study')||(i===1&&tab==='report')));
  document.getElementById('tab-study').style.display=tab==='study'?'':'none';
  document.getElementById('tab-report').style.display=tab==='report'?'':'none';
  if(tab==='report'){showReportMain();renderReport();}
}
function switchSubTab(t){
  document.querySelectorAll('.sub-tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='new')||(i===1&&t==='review')));
  document.getElementById('sub-new').style.display=t==='new'?'':'none';
  document.getElementById('sub-review').style.display=t==='review'?'':'none';
}
function showReportMain(){
  document.getElementById('report-main').style.display='';
  document.getElementById('report-weak').style.display='none';
  document.getElementById('report-star').style.display='none';
}
function showReportDetail(type){
  document.getElementById('report-main').style.display='none';
  if(type==='weak'){
    document.getElementById('report-weak').style.display='';
    document.getElementById('report-star').style.display='none';
    renderWeakFull();
  }else{
    document.getElementById('report-star').style.display='';
    document.getElementById('report-weak').style.display='none';
    renderStarFull();
  }
}
function renderReport(){renderWeekRow();renderStats();renderPreviews();}
function renderWeekRow(){
  const row=document.getElementById('week-row'),log=getStudyLog();
  const days=['일','월','화','수','목','금','토'],today=new Date();
  const sunday=new Date(today);sunday.setDate(today.getDate()-today.getDay());
  row.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(sunday);d.setDate(sunday.getDate()+i);
    const studied=!!log[d.toDateString()],isToday=d.toDateString()===today.toDateString();
    const div=document.createElement('div');
    div.className='week-day'+(studied?' studied':'')+(isToday?' today':'');
    div.innerHTML=`<div class="wd-label">${days[i]}${isToday?'<br><span style="font-size:9px;color:var(--green-pastel-deeper)">오늘</span>':''}</div><div class="wd-dot"></div>`;
    row.appendChild(div);
  }
}
function renderStats(){
  const log=getStudyLog(),entries=Object.values(log);
  const totalWords=entries.reduce((a,b)=>a+(b.words||0),0);
  const studiedDays=entries.filter(e=>e.words>0).length||1;
  document.getElementById('avg-words').textContent=Math.round(totalWords/studiedDays)+'개';
  document.getElementById('total-sessions').textContent=entries.reduce((a,b)=>a+(b.sessions||0),0)+'회';
}
function renderPreviews(){
  const weak=getWeakWords();
  document.getElementById('weak-preview').textContent=weak.length?`${weak.length}개 · 1위: ${weak[0].kanji}`:'기록 없음';
  const starred=getStarred();
  document.getElementById('star-preview').textContent=starred.length?`총 ${starred.length}개`:'별표한 단어 없음';
}
function renderWeakFull(){
  const weak=getWeakWords(),list=document.getElementById('weak-full-list');
  if(!weak.length){list.innerHTML='<div class="empty-state">모르겠음 기록이 없어요</div>';return;}
  list.innerHTML=weak.map((w,i)=>`
    <div class="rank-item">
      <div class="rank-num">${i+1}</div>
      <div style="flex:1;min-width:0"><div class="rank-kanji">${w.kanji}</div><div class="rank-reading">${w.reading} · ${w.meaning}</div></div>
      <div class="rank-count">${w.unknownCount}회</div>
    </div>`).join('');
}
function renderStarFull(){
  const starred=getStarred(),list=document.getElementById('star-full-list');
  if(!starred.length){list.innerHTML='<div class="empty-state">별표한 단어가 없어요</div>';return;}
  list.innerHTML=starred.map(w=>`
    <div class="star-item">
      <span style="font-size:16px;color:#e6a800;flex-shrink:0">★</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:500;color:#333">${w.kanji}</div>
        <div style="font-size:12px;color:#aaa">${w.reading} · ${w.meaning}</div>
      </div>
    </div>`).join('');
}
loadDB();renderDayList();updateTotalInfo();
</script>
